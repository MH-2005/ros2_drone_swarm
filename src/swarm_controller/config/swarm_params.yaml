
#ROS2 parameters 
swarm_leader_0:
  ros__parameters:
    drone_id: 0
    max_velocity: 2.0
    formation_spacing: 5.0
    home_position: [0.0, 0.0, 5.0]
    use_sim_time: true

swarm_follower_1:
  ros__parameters:
    drone_id: 1
    max_velocity: 2.0
    safety_distance: 3.0
    max_distance: 10.0
    home_position: [5.0, 0.0, 5.0]
    use_sim_time: true

swarm_follower_2:
  ros__parameters:
    drone_id: 2
    max_velocity: 2.0
    safety_distance: 3.0
    max_distance: 10.0
    home_position: [0.0, 5.0, 5.0]
    use_sim_time: true

swarm_follower_3:
  ros__parameters:
    drone_id: 3
    max_velocity: 2.0
    safety_distance: 3.0
    max_distance: 10.0
    home_position: [-5.0, 0.0, 5.0]
    use_sim_time: true

formation_controller:
  ros__parameters:
    num_drones: 4
    formation_timeout: 180.0
    use_sim_time: true

mission_executor:
  ros__parameters:
    video_recording: true
    video_output_dir: "./videos/"
    mission_timeout: 180.0
    use_sim_time: true
